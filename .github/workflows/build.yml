name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Bump patch version
        run: |
          current=$(cat VERSION)
          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          echo "$major.$minor.$patch" > VERSION

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add VERSION
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump version to $(cat VERSION) [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        run: |
          bun build src/nox.ts --compile --target=bun-linux-x64 --outfile nox-linux-amd64
          bun build src/nox.ts --compile --target=bun-linux-arm64 --outfile nox-linux-arm64

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Delete existing latest tag
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "nox ${{ steps.version.outputs.version }}" \
            --notes "Automated build from main branch" \
            --latest \
            nox-linux-amd64 \
            nox-linux-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
